name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-audit:
    name: Backend dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # Keep caret ranges in package.json; this gate catches known prod-dep
      # vulnerabilities of high+ severity before they merge.
      - run: npm audit --omit=dev --audit-level=high

  backend-test:
    name: Backend test suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      # The mongod binary mongodb-memory-server downloads is ~hundreds of MB;
      # cache it so every run doesn't re-fetch (and risk the beforeAll timeout).
      - name: Cache mongodb-memory-server binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}
      - run: npm ci
      - run: npm test
