name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-audit:
    name: Backend dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # Keep caret ranges in package.json; this gate catches known prod-dep
      # vulnerabilities of high+ severity before they merge.
      - run: npm audit --omit=dev --audit-level=high
